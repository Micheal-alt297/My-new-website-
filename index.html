<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navigation -->
    <nav>
        <div class="container">
            <a href="#home">Home</a>
            <a href="#about">About</a>
            <a href="#contact">Contact</a>
        </div>
    </nav>
<!-- Home Section -->
<div class="container" id="home">
    <div class="hero">
        <h1>Welcome to My Website</h1>
        <p>This is my first personal website built with HTML and CSS.</p>
        <a href="#contact" class="btn">Contact Me</a>
        <img src="images/myimage.jpg" alt="My Image">
    </div>
</div>
    <!-- About Section -->
<div class="container" id="about">
    <div class="card">
        <h2>About Me</h2>
        <p>Write a little about yourself here. You can add your hobbies, skills, or anything you like.</p>
        <img src="images/myimage2.jpg" alt="Another Image">
    </div>
</div>

<!-- Contact Section -->
<div class="container" id="contact">
    <div class="card">
        <h2>Contact Me</h2>
        <p>You can reach me at <a href="mailto:myemail@example.com">myemail@example.com</a></p>
        <a href="mailto:myemail@example.com" class="btn">Send Email</a>
    </div>
</div>

</body>
</html>
